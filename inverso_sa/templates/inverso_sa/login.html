{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Inverso</title>

    <link rel="stylesheet" href="{% static 'inverso_sa/css/login.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&display=swap" rel="stylesheet">
</head>
<body>

<main class="page-container">
    <section class="login-card">
        <div class="brand-header">
            <div class="logo-wrapper">
                <img src="{% static 'inverso_sa/img/logo.jpeg' %}" alt="Inverso" class="logo-img">
            </div>
            <h1 class="brand-title">INVE<span>RSO</span></h1>
        </div>

        {% if error %}
            <p style="color:red; text-align:center;">{{ error }}</p>

            <!-- 🔁 Rehabilitar botón si falla el login -->
            <script>
                window.onload = function () {
                    const btn = document.getElementById('submit-btn');
                    const msg = document.getElementById('wait-msg');

                    if (btn) btn.disabled = false;
                    if (msg) msg.style.display = 'none';
                };
            </script>
        {% endif %}

        <form method="POST" class="form-container" id="login-form">
            {% csrf_token %}

            <div class="input-group">
                <label>USUARIO</label>
                <input type="text" name="username" required>
            </div>

            <div class="input-group">
                <label>CONTRASEÑA</label>
                <input type="password" name="password" required>
            </div>

            <button type="submit" class="submit-btn" id="submit-btn">
                ACCEDER AHORA
            </button>

            <p id="wait-msg"
               style="display:none; text-align:center; margin-top:10px; color:#f59e0b;">
                ⏳ Por favor espera mientras el sistema valida tus datos...
            </p>

            <div class="form-footer">
                <a href="#">¿Olvidaste tu contraseña?</a>
                <span class="divider">|</span>
                <a href="{% url 'registro' %}" class="highlight">Registrarse</a>
            </div>
        </form>
    </section>
</main>

<script>
const form = document.getElementById('login-form');
const btn = document.getElementById('submit-btn');
const msg = document.getElementById('wait-msg');

form.addEventListener('submit', function () {
    btn.disabled = true;
    msg.style.display = 'block';
});
</script>

</body>
</html>
