{% extends "inverso_sa/dashboard.html" %}
{% load static %}

{% block title %}Trading | Inverso{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'inverso_sa/css/trading.css' %}">
{% endblock %}

{% block contenido %}
<div class="trading-fullscreen">

    <!-- TOP BAR -->
    <div class="trading-topbar">
        <h3 id="asset-name">📈 EUR/USD</h3>
        <div class="balance">💰 Balance: ${{ request.user.saldo }}</div>
    </div>

    <!-- MAIN -->
    <div class="trading-main">

        <!-- CHART -->
        <div class="chart-area">
            <div id="tradingview_chart"></div>
        </div>

        <!-- PANEL -->
        <div class="trade-panel">
            <h4>Realizar Operación</h4>

            <input type="number" id="amount" placeholder="Monto">

            <select id="duration">
                <option value="30">30 segundos</option>
                <option value="60">1 minuto</option>
                <option value="300">5 minutos</option>
            </select>

            <button class="btn-buy" onclick="openTrade('buy')">⬆ COMPRAR</button>
            <button class="btn-sell" onclick="openTrade('sell')">⬇ VENDER</button>
        </div>
    </div>

    <!-- HISTORY -->
    <div class="history">
        <table>
            <thead>
                <tr>
                    <th>Hora</th>
                    <th>Activo</th>
                    <th>Monto</th>
                    <th>Estado</th>
                </tr>
            </thead>
            <tbody id="history-body"></tbody>
        </table>
    </div>

</div>

<script src="https://s3.tradingview.com/tv.js"></script>
<script src="{% static 'inverso_sa/js/trading.js' %}"></script>
{% endblock %}
